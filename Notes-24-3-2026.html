<html>
        <head><title>Downloaded HTML</title></head>
        <body>
            <pre style="white-space: pre-wrap; word-wrap: break-word;"><!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ADDEV — Web App</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
 --bg:#050810;
 --card:rgba(255,255,255,0.06);
 --glass:rgba(255,255,255,0.08);
 --accent:#6c8bff;
 --accent2:#a78bfa;
 --green:#34d399;
 --red:#f87171;
}
*{box-sizing:border-box}
body{margin:0;font-family:'DM Sans',sans-serif;background:var(--bg);color:white}

/* LAYOUT */
.app{display:grid;grid-template-columns:240px 1fr;height:100vh}
.sidebar{background:rgba(0,0,0,0.4);padding:20px;backdrop-filter:blur(20px)}
.sidebar h2{font-family:'Syne';margin-bottom:20px}
.sidebar button{display:block;width:100%;margin:10px 0;padding:10px;border:none;background:var(--glass);color:white;border-radius:10px;cursor:pointer}

.main{padding:20px;overflow-y:auto}
.grid{display:grid;grid-template-columns:2fr 1fr;gap:20px}
.card{background:var(--card);padding:20px;border-radius:20px;backdrop-filter:blur(20px);animation:fade 0.5s ease}

@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1}}

.balance{font-family:'Syne';font-size:40px}
.btn{padding:10px 15px;border:none;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;cursor:pointer}
.input{width:100%;padding:10px;margin:5px 0;border-radius:10px;border:none}

.tx{padding:8px;border-bottom:1px solid rgba(255,255,255,0.05);display:flex;justify-content:space-between}

.glow{box-shadow:0 0 20px rgba(108,139,255,0.4)}

.center{display:flex;flex-direction:column;justify-content:center;align-items:center;height:100vh}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login" class="center">
<h1 style="font-family:Syne">ADDEV 🔐</h1>
<input id="email" class="input" placeholder="Email">
<input id="password" type="password" class="input" placeholder="Password">
<button class="btn" onclick="login()">Enter App</button>
</div>

<!-- APP -->
<div id="app" class="app" style="display:none">

<!-- SIDEBAR -->
<div class="sidebar">
<h2>ADDEV</h2>
<button onclick="switchTab('dashboard')">🏠 Dashboard</button>
<button onclick="switchTab('reports')">📊 Reports</button>
<button onclick="switchTab('add')">➕ Add Expense</button>
<button onclick="logout()">🚪 Logout</button>
</div>

<!-- MAIN -->
<div class="main">

<!-- DASHBOARD -->
<div id="dashboard" class="tab">
<div class="grid">
<div>
<div class="card glow">
<div>Total Balance</div>
<div class="balance">₹<span id="balance">0</span></div>
</div>

<div class="card">
<h3>Transactions</h3>
<div id="tx"></div>
</div>

<div class="card">
<h3>AI Insight 🤖</h3>
<p id="ai"></p>
</div>
</div>

<div>
<div class="card">
<h3>Spending Chart</h3>
<canvas id="pie"></canvas>
</div>

<div class="card">
<h3>Trend</h3>
<canvas id="line"></canvas>
</div>
</div>
</div>
</div>

<!-- ADD -->
<div id="add" class="tab" style="display:none">
<div class="card">
<h2>Add Expense</h2>
<input id="amt" class="input" placeholder="Amount ₹">
<select id="cat" class="input">
<option>Food</option>
<option>Travel</option>
<option>Shopping</option>
<option>Bills</option>
</select>
<input id="note" class="input" placeholder="Note">
<button class="btn" onclick="add()">Save</button>
</div>
</div>

<!-- REPORTS -->
<div id="reports" class="tab" style="display:none">
<div class="card">
<h2>Total Spent</h2>
<h1 id="total"></h1>
</div>
<div class="card">
<h3>All Expenses</h3>
<div id="reportList"></div>
</div>
</div>

</div>
</div>

<script>
let balance=10000;
let data=JSON.parse(localStorage.getItem('data'))||[];

function login(){
 let email=document.getElementById('email').value;
 let pass=document.getElementById('password').value;
 if(!email||!pass)return alert('Enter details');
 localStorage.setItem('user',email);
 document.getElementById('login').style.display='none';
 document.getElementById('app').style.display='grid';
 render();
}

function logout(){localStorage.clear();location.reload();}

function switchTab(id){
 document.querySelectorAll('.tab').forEach(t=>t.style.display='none');
 document.getElementById(id).style.display='block';
}

function add(){
 let amt=parseInt(document.getElementById('amt').value);
 let cat=document.getElementById('cat').value;
 let note=document.getElementById('note').value;
 if(!amt)return alert('Enter amount');
 balance-=amt;
 data.unshift({amt,cat,note,date:new Date().toLocaleDateString()});
 localStorage.setItem('data',JSON.stringify(data));
 render();
 switchTab('dashboard');
}

function render(){
 document.getElementById('balance').innerText=balance;
 document.getElementById('tx').innerHTML=data.slice(0,6).map(d=>`<div class='tx'><span>${d.cat}</span><span>-₹${d.amt}</span></div>`).join('');

 let total=0; data.forEach(d=>total+=d.amt);
 document.getElementById('total').innerText='₹'+total;
 document.getElementById('reportList').innerHTML=data.map(d=>`<div class='tx'>₹${d.amt} - ${d.cat}</div>`).join('');

 buildCharts(); buildAI();
}

let pie,line;
function buildCharts(){
 let cats={};
 let trend=[];
 data.forEach(d=>{
  cats[d.cat]=(cats[d.cat]||0)+d.amt;
  trend.push(d.amt);
 });

 if(pie) pie.destroy();
 pie=new Chart(pie=document.getElementById('pie'),{
  type:'doughnut',
  data:{labels:Object.keys(cats),datasets:[{data:Object.values(cats)}]}
 });

 if(line) line.destroy();
 line=new Chart(document.getElementById('line'),{
  type:'line',
  data:{labels:trend.map((_,i)=>i+1),datasets:[{data:trend}]}
 });
}

function buildAI(){
 let msg='';
 let total=data.reduce((a,b)=>a+b.amt,0);
 if(total>5000) msg='⚠️ High spending detected';
 else msg='✅ Spending looks good';
 document.getElementById('ai').innerText=msg;
}

window.onload=()=>{
 let user=localStorage.getItem('user');
 if(user){
  document.getElementById('login').style.display='none';
  document.getElementById('app').style.display='grid';
  render();
 }
}
</script>

</body>
</html>
